{% extends "base.html" %}
{% block title %}casino — Hamarosan{% endblock %}
{% block head %}
<style>
  .casino-placeholder {
    max-width: 680px;
    margin: 4rem auto;
    text-align: center;
    padding: 0 1rem;
  }
  .casino-sign-large {
    width: min(100%, 560px);
    max-height: 230px;
    object-fit: contain;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 18px var(--shadow-gold));
  }
  .casino-copy {
    color: var(--cream-dark);
    font-style: italic;
    margin: 0.5rem 0 2rem;
  }
  .casino-actions { margin-top: 2rem; }
</style>
{% endblock %}
{% block content %}
<div class="casino-placeholder">
  <img src="{{ url_for('static', filename='assets/kasino_sign.png') }}" alt="Kaszinó neon tábla" class="casino-sign-large">
  <h1>casino</h1>
  <p class="casino-copy">
    Ez a mini-játék még fejlesztés alatt áll. Hamarosan!
  </p>
  <div class="npc-hint" id="npc-hint">Betöltés...</div>
  <div class="casino-actions">
    <a href="/" class="btn btn-gold">← Vissza a Plazára</a>
  </div>
</div>
{% endblock %}
